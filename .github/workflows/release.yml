name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            ffmpeg_url: "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-darwin-x64"
            ffmpeg_bin: "ffmpeg-x86_64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: yarn install --frozen-lockfile

      - name: Validate i18n keys
        run: yarn validate:i18n

      - name: Update version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BASE_VERSION="${VERSION%%-*}"
            if [[ "$VERSION" == *-* ]]; then
              PRERELEASE="${VERSION#*-}"
              if [[ "$PRERELEASE" =~ ([0-9]+) ]]; then
                PRERELEASE_NUMBER="${BASH_REMATCH[1]}"
                if (( 10#$PRERELEASE_NUMBER > 65535 )); then
                  echo "Windows MSI prerelease version must be <= 65535: $PRERELEASE_NUMBER"
                  exit 1
                fi
                VERSION="${BASE_VERSION}-${PRERELEASE_NUMBER}"
              else
                VERSION="$BASE_VERSION"
              fi
            fi
          fi
          echo "Version: $VERSION"
          VERSION="$VERSION" node -e "const fs = require('fs'); const path = 'src-tauri/tauri.conf.json'; const config = JSON.parse(fs.readFileSync(path, 'utf8')); config.version = process.env.VERSION; fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');"

      - name: Download FFmpeg binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -fL --http1.1 --retry 3 -o "src-tauri/binaries/${{ matrix.ffmpeg_bin }}" "${{ matrix.ffmpeg_url }}"
          test -s "src-tauri/binaries/${{ matrix.ffmpeg_bin }}"
          chmod +x "src-tauri/binaries/${{ matrix.ffmpeg_bin }}"
          test -x "src-tauri/binaries/${{ matrix.ffmpeg_bin }}"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: "--target ${{ matrix.target }}"

      - name: Verify bundled FFmpeg
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *apple-darwin ]]; then
            bundled_ffmpeg="$(find src-tauri/target -type f \( -path "*/TinyCut.app/Contents/MacOS/ffmpeg" -o -path "*/TinyCut.app/Contents/Resources/ffmpeg" \) -print -quit)"
          else
            bundled_ffmpeg="$(find src-tauri/target -type f -name "ffmpeg.exe" -print -quit)"
          fi

          if [ -z "$bundled_ffmpeg" ]; then
            echo "Bundled FFmpeg not found"
            find src-tauri/target -type f \( -name "ffmpeg" -o -name "ffmpeg.exe" -o -name "ffmpeg-*" \) -print
            exit 1
          fi

          test -x "$bundled_ffmpeg"
          echo "Bundled FFmpeg: $bundled_ffmpeg"

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          release_id: ${{ needs.create-release.outputs.release_id }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
